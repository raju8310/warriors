<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warriors DevOps Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#111;color:#fff}
header{background:#1f2937;padding:15px;text-align:center}
header h1{color:#38bdf8}
.container{padding:20px}
#search{width:100%;padding:10px;border:none;border-radius:5px;margin-bottom:20px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px}
.card{background:#1e293b;padding:20px;border-radius:10px;text-align:center;transition:.3s}
.card:hover{transform:scale(1.05);background:#2563eb}
.card img{width:60px;height:60px}
.progress{background:#444;height:10px;border-radius:5px;margin-top:10px}
.bar{height:10px;background:#22c55e;border-radius:5px}
.status{margin-top:25px;background:#1e293b;padding:20px;border-radius:10px}
button{margin-top:15px;padding:10px 20px;background:#38bdf8;border:none;color:#fff;border-radius:5px;cursor:pointer}
button:hover{background:#0ea5e9}
footer{text-align:center;padding:15px;margin-top:20px;background:#1f2937}
</style>
</head>
<body>

<header>
<h1>⚔ Warriors DevOps Dashboard</h1>
<p id="clock"></p>
</header>

<div class="container">

<input type="text" id="search" placeholder="Search DevOps Tool..." onkeyup="filterCards()">

<div class="cards" id="cards">

<div class="card">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/git/git-original.svg">
<h3>Git</h3>
<p>Version Control</p>
</div>

<div class="card">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/github/github-original.svg">
<h3>GitHub</h3>
<p>Code Repository</p>
</div>

<div class="card">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/docker/docker-original.svg">
<h3>Docker</h3>
<p>Containerization</p>
</div>

<div class="card">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/kubernetes/kubernetes-plain.svg">
<h3>Kubernetes</h3>
<p>Orchestration</p>
</div>

<div class="card">
<img src="https://www.jenkins.io/images/logos/jenkins/jenkins.svg">
<h3>Jenkins</h3>
<p>CI/CD Pipeline</p>
</div>

<div class="card">
<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/linux/linux-original.svg">
<h3>Linux</h3>
<p>Server Management</p>
</div>

</div>

<div class="status">
<h2>Deployment Progress</h2>
<div class="progress">
<div class="bar" id="bar" style="width:0%"></div>
</div>
<p id="percent">0%</p>
<button onclick="deploy()">Deploy Application</button>
</div>

</div>

<footer>
<p>© 2026 Warriors DevOps Project | Java • DevOps • Cloud</p>
</footer>

<script>
function clock(){
let d=new Date();
document.getElementById("clock").innerHTML=d.toLocaleTimeString();
}
setInterval(clock,1000);
clock();

function filterCards(){
let input=document.getElementById("search").value.toLowerCase();
let cards=document.querySelectorAll(".card");
cards.forEach(card=>{
let text=card.innerText.toLowerCase();
card.style.display=text.includes(input)?"block":"none";
});
}

function deploy(){
let width=0;
let bar=document.getElementById("bar");
let txt=document.getElementById("percent");
let interval=setInterval(()=>{
if(width>=100){
clearInterval(interval);
txt.innerHTML="Deployment Successful ✅";
}else{
width++;
bar.style.width=width+"%";
txt.innerHTML=width+"%";
}
},40);
}
</script>

</body>
</html>
