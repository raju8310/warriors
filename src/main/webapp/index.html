<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DevOps Task Manager</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#eef2f7;transition:.3s}
.dark{background:#1e1e1e;color:#fff}
.container{max-width:700px;margin:30px auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 0 10px #999}
.dark .container{background:#333}
h1{text-align:center;color:#0077cc}
input,select,button{
padding:10px;margin:5px;width:100%;border:1px solid #ccc;border-radius:5px
}
button{
background:#0077cc;color:#fff;font-weight:bold;cursor:pointer
}
button:hover{background:#005fa3}
ul{list-style:none;margin-top:20px}
li{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
margin:5px 0;
background:#f2f2f2;
border-radius:5px;
}
.dark li{background:#555}
.delete{
background:red;
padding:5px 10px;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}
.top{
display:flex;
gap:10px;
}
.top button{
width:150px;
}
small{
color:gray;
}
</style>
</head>
<body>

<div class="container">

<h1>🚀 DevOps Task Manager</h1>

<div class="top">
<input id="search" placeholder="Search Task">
<button onclick="toggleMode()">🌙 Mode</button>
</div>

<input id="task" placeholder="Task Name">

<select id="status">
<option>Pending</option>
<option>In Progress</option>
<option>Completed</option>
</select>

<button onclick="addTask()">Add Task</button>

<ul id="list"></ul>

</div>

<script>

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function render(){

let keyword=document.getElementById("search").value.toLowerCase();

let html="";

tasks.filter(t=>t.name.toLowerCase().includes(keyword))
.forEach((t,i)=>{

html+=`
<li>
<div>
<b>${t.name}</b><br>
<small>Status : ${t.status}</small>
</div>

<button class="delete" onclick="removeTask(${i})">
Delete
</button>

</li>
`;

});

document.getElementById("list").innerHTML=html;

}

function addTask(){

let name=document.getElementById("task").value.trim();
let status=document.getElementById("status").value;

if(name==""){
alert("Enter Task");
return;
}

tasks.push({
name:name,
status:status
});

save();

document.getElementById("task").value="";

render();

}

function removeTask(i){

tasks.splice(i,1);

save();

render();

}

document.getElementById("search").addEventListener("keyup",render);

function toggleMode(){

document.body.classList.toggle("dark");

}

render();

</script>

</body>
</html>
